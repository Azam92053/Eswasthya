# Server
server.port=8080
spring.application.name=eswasthya-backend

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/eswasthya_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
# For production, provide credentials via environment variables (SPRING_DATASOURCE_*).
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT Security
# Override this secret outside local development.
app.jwt.secret=${APP_JWT_SECRET:PleaseChangeThisInProd}
app.jwt.expiration-ms=86400000

# External Health API (health.gov MyHealthFinder)
app.external.health-api.base-url=https://health.gov/myhealthfinder/api/v3
app.external.health-api.cache-ttl-hours=24
app.external.health-api.enabled=true

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Logging
logging.level.com.eswasthya=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
