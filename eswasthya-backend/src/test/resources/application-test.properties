# Test profile backed by H2.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.jwt.secret=TestSecretKeyForJWTAuthenticationVeryLongSecretKey1234567890
app.jwt.expiration-ms=3600000

app.external.health-api.base-url=https://health.gov/myhealthfinder/api/v3
app.external.health-api.cache-ttl-hours=24
app.external.health-api.enabled=false
